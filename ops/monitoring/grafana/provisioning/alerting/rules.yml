apiVersion: 1

groups:
  - orgId: 1
    name: application-log-alerts
    folder: Time2Gather Operations
    interval: 1m
    rules:
      - uid: backend-log-errors
        title: Backend error logs detected
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: loki
            model:
              datasource:
                type: loki
                uid: loki
              editorMode: code
              expr: 'sum(count_over_time({service="backend"} |~ "(?i)(error|exception|fatal)" [5m]))'
              intervalMs: 1000
              maxDataPoints: 43200
              queryType: range
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              reducer: sum
              refId: B
              type: reduce
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [0]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [C]
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: B
              refId: C
              type: threshold
        noDataState: OK
        execErrState: Error
        for: 1m
        annotations:
          description: 최근 5분 동안 Time2Gather 백엔드에서 오류 또는 예외 로그가 감지되었습니다.
          summary: Time2Gather 백엔드 오류 로그 감지
        labels:
          service: backend
          severity: warning
